#VRML_SIM R2023b utf8
# updated wall proto
# 


PROTO wall_proto [
  field SFVec3f translation 0 0 0
  field SFString name "cube"
]
{
  Solid {
    translation IS translation
    name IS name
    rotation 0 0 1 0
  children [
    Shape {
      appearance Appearance {
        material Material {
          ambientIntensity 0.6
          diffuseColor 1 1 1
        }
        texture ImageTexture {
          url [
            "texture2.jpg"
          ]
        }
      }
      geometry DEF _WALL Box {
        size 0.2 0.2 0.2
      }
    }
  ]
  boundingObject USE _WALL
  }
}
